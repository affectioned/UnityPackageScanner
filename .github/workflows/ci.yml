name: CI / Release

on:
  push:
    branches: ["**"]
    tags: ["v*.*.*"]
  pull_request:

permissions:
  contents: write

defaults:
  run:
    shell: bash

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test with coverage
        run: |
          dotnet test tests/UnityPackageScanner.Tests/UnityPackageScanner.Tests.csproj \
            --configuration Release \
            --no-build \
            --collect:"XPlat Code Coverage" \
            --settings tests/UnityPackageScanner.Tests/coverlet.runsettings \
            --results-directory ./coverage

      - name: Install ReportGenerator
        run: dotnet tool install --global dotnet-reportgenerator-globaltool

      - name: Generate coverage report
        run: |
          reportgenerator \
            -reports:./coverage/**/coverage.cobertura.xml \
            -targetdir:./coverage/report \
            -reporttypes:TextSummary

      - name: Check coverage threshold (≥85%)
        run: |
          SUMMARY=$(cat ./coverage/report/Summary.txt 2>/dev/null || echo "")
          echo "$SUMMARY"
          LINE_COV=$(echo "$SUMMARY" | grep -oP 'Line coverage: \K[\d.]+' || echo "0")
          echo "Line coverage: $LINE_COV%"
          if (( $(echo "$LINE_COV < 85" | bc -l) )); then
            echo "::error::Coverage $LINE_COV% is below 85% threshold"
            exit 1
          fi

      - name: Verify docs/rules.md is current
        run: |
          dotnet run --project tools/RulesDocGenerator --configuration Release -- /tmp/rules_check.md
          diff docs/rules.md /tmp/rules_check.md || (echo "::error::docs/rules.md is out of date. Run: dotnet run --project tools/RulesDocGenerator" && exit 1)

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: ./coverage/report/

  publish:
    name: Publish — ${{ matrix.rid }}
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # Restore with the target RID so packages are cached before the nested
      # dotnet publish calls inside PublishDllWorker (csproj Exec target) run.
      - run: dotnet restore --runtime ${{ matrix.rid }}

      - name: Publish GUI
        run: |
          dotnet publish src/UnityPackageScanner.UI \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore \
            --output ./publish/gui/${{ matrix.rid }}

      - name: Publish CLI
        run: |
          dotnet publish src/UnityPackageScanner.Cli \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --no-restore \
            --output ./publish/cli/${{ matrix.rid }}

      - name: Package
        run: |
          TAG=${{ steps.version.outputs.version }}
          RID=${{ matrix.rid }}
          cp README.md LICENSE ./publish/gui/$RID/
          cp README.md LICENSE ./publish/cli/$RID/
          if [ "$RID" = "win-x64" ]; then
            # zip is not available in Git Bash on Windows runners; 7z always is.
            # cd into the dir first so 7z stores files at root, not under publish/gui/win-x64/.
            (cd "./publish/gui/$RID" && 7z a -tzip "../../../UnityPackageScanner-${TAG}-${RID}.zip" .)
            (cd "./publish/cli/$RID" && 7z a -tzip "../../../unity-package-scanner-cli-${TAG}-${RID}.zip" .)
          else
            tar -czf "UnityPackageScanner-${TAG}-${RID}.tar.gz" -C "./publish/gui/$RID" .
            tar -czf "unity-package-scanner-cli-${TAG}-${RID}.tar.gz" -C "./publish/cli/$RID" .
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    needs: publish
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: ./artifacts

      - name: Generate SHA-256 checksums
        run: |
          cd ./artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
