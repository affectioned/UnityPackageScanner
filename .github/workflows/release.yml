name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Verify Tests — ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore & Test
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test tests/UnityPackageScanner.Tests --configuration Release --no-build

  publish:
    name: Publish — ${{ matrix.rid }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: osx-x64
            os: macos-latest
          - rid: osx-arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.x"

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Publish GUI
        run: |
          dotnet publish src/UnityPackageScanner.UI \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./publish/gui/${{ matrix.rid }}

      - name: Publish CLI
        run: |
          dotnet publish src/UnityPackageScanner.Cli \
            --configuration Release \
            --runtime ${{ matrix.rid }} \
            --self-contained true \
            -p:PublishSingleFile=true \
            -p:IncludeNativeLibrariesForSelfExtract=true \
            -p:Version=${{ steps.version.outputs.version }} \
            --output ./publish/cli/${{ matrix.rid }}

      - name: Package GUI (zip — Windows)
        if: matrix.rid == 'win-x64'
        run: |
          cp README.md LICENSE ./publish/gui/${{ matrix.rid }}/
          Compress-Archive -Path ./publish/gui/${{ matrix.rid }}/* -DestinationPath "UnityPackageScanner-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"
        shell: pwsh

      - name: Package GUI (tar.gz — Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: |
          cp README.md LICENSE ./publish/gui/${{ matrix.rid }}/
          tar -czf "UnityPackageScanner-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" \
            -C ./publish/gui/${{ matrix.rid }} .

      - name: Package CLI (zip — Windows)
        if: matrix.rid == 'win-x64'
        run: |
          cp README.md LICENSE ./publish/cli/${{ matrix.rid }}/
          Compress-Archive -Path ./publish/cli/${{ matrix.rid }}/* -DestinationPath "unity-package-scanner-cli-${{ steps.version.outputs.version }}-${{ matrix.rid }}.zip"
        shell: pwsh

      - name: Package CLI (tar.gz — Linux/macOS)
        if: matrix.rid != 'win-x64'
        run: |
          cp README.md LICENSE ./publish/cli/${{ matrix.rid }}/
          tar -czf "unity-package-scanner-cli-${{ steps.version.outputs.version }}-${{ matrix.rid }}.tar.gz" \
            -C ./publish/cli/${{ matrix.rid }} .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.rid }}
          path: |
            *.zip
            *.tar.gz

  release:
    name: Create GitHub Release
    needs: publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Check if pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: ./artifacts

      - name: Generate SHA-256 checksums
        run: |
          cd ./artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "${{ github.ref_name }}"
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          generate_release_notes: true
          files: |
            ./artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
